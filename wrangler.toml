# Cloudflare Workers configuration (OpenNext)
name = "ai-voice-labs-web"
main = ".open-next/worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Assets configuration
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "ai-voice-labs"
database_id = "57652cf3-2ce9-468f-bc7e-18b3af5bc64b"