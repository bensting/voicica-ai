<svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <!-- 背景渐变紫 -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <!-- 白色发光 -->
    <filter id="whiteGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 紫色背景 -->
  <rect width="50" height="50" rx="12" fill="url(#bgGrad)" />

  <!-- 麦克风主体 + 弯支架 + 声波 -->
  <g transform="translate(25,25)" filter="url(#whiteGlow)">
    <!-- 主体 -->
    <rect x="-5" y="-14" width="10" height="18" rx="5" fill="white" />

    <!-- 弯支架 -->
    <path d="M -8 6 Q -8 10, 0 10 Q 8 10, 8 6" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- 声波 -->
    <path d="M -13 -5 Q -15 0, -13 5" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.8"/>
    <path d="M 13 -5 Q 15 0, 13 5" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  </g>
</svg>
