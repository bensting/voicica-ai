<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad1)"/>

  <!-- Microphone Icon -->
  <g transform="translate(256, 256)">
    <!-- Mic Body -->
    <rect x="-40" y="-120" width="80" height="140" rx="40" fill="white"/>

    <!-- Mic Stand -->
    <path d="M -60 40 Q -60 80, 0 80 Q 60 80, 60 40" stroke="white" stroke-width="16" fill="none" stroke-linecap="round"/>
    <line x1="0" y1="80" x2="0" y2="130" stroke="white" stroke-width="16" stroke-linecap="round"/>
    <line x1="-50" y1="130" x2="50" y2="130" stroke="white" stroke-width="16" stroke-linecap="round"/>

    <!-- Sound Waves -->
    <path d="M -100 -40 Q -120 0, -100 40" stroke="white" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M 100 -40 Q 120 0, 100 40" stroke="white" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>